version: "3.9"

services:
  # -----------------------------------------------------------------------
  # FastAPI backend
  # -----------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sca_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEBUG:             "false"
      SECRET_KEY:        "${SECRET_KEY}"
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       scanalytics
      POSTGRES_USER:     scanalytics
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      REDIS_HOST:        redis
      REDIS_PORT:        "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout:  10s
      retries:  3

  # -----------------------------------------------------------------------
  # PostgreSQL 16
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       scanalytics
      POSTGRES_USER:     scanalytics
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanalytics -d scanalytics"]
      interval: 10s
      timeout:  5s
      retries:  5

  # -----------------------------------------------------------------------
  # Redis 7
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sca_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

volumes:
  postgres_data:
  redis_data:
