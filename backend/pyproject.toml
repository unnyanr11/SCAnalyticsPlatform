[tool.ruff]
target-version = "py311"
line-length = 100
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print
]
ignore = [
    "S101",   # assert used in tests is fine
    "B008",   # function call in default arg (FastAPI Depends pattern)
    "N803",   # argument name should be lowercase — allow ABCs
    "T201",   # print used in scripts
]
exclude = ["alembic", ".venv", "venv", "migrations"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S", "T20"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["alembic", "migrations", "tests"]
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
