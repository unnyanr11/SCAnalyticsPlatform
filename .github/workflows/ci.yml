name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Backend: lint + test
  # ----------------------------------------------------------------
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scanalytics
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scanalytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://scanalytics:password@localhost:5432/scanalytics_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  # ----------------------------------------------------------------
  # Extension: lint + type check
  # ----------------------------------------------------------------
  extension:
    name: Extension (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npx eslint src/ content/ background/ services/ websocket/ popup/ --ext .ts,.tsx

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build
